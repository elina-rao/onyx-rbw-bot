# Onyx RBW - Rooted
# World configuration
# After placing the map folder in paper/, run:
#   /bw add Rooted
#   /bw setarena Rooted
# Then use /bw setup Rooted to configure spawns and generators in-game.

world: "Rooted"
config-version: "22.01"

# Build height limits
min-build-y: 90
max-build-y: 115
build-limit: 115

# Game settings
game-time: 900
waiting-time: 15
ending-time: 10
respawn-time: 5
players-per-team: 4
min-teams: 2

# Arena group for matchmaking
group: "ranked"

# Enable/disable
enabled: true

# Database storage
database: false

# Target blocks (beds)
target-blocks:
- BED_BLOCK
- BED

# Spectator settings
spectator-spawn:
  world: "Rooted"
  x: 0
  y: 125
  z: 0
  yaw: 0
  pitch: 90

