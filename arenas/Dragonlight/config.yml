# Onyx RBW - Dragonlight
# World configuration
# After placing the map folder in paper/, run:
#   /bw add Dragonlight
#   /bw setarena Dragonlight
# Then use /bw setup Dragonlight to configure spawns and generators in-game.

world: "Dragonlight"
config-version: "22.01"

# Build height limits
min-build-y: 95
max-build-y: 120
build-limit: 120

# Game settings
game-time: 900
waiting-time: 15
ending-time: 10
respawn-time: 5
players-per-team: 4
min-teams: 2

# Arena group for matchmaking
group: "ranked"

# Enable/disable
enabled: true

# Database storage
database: false

# Target blocks (beds)
target-blocks:
- BED_BLOCK
- BED

# Spectator settings
spectator-spawn:
  world: "Dragonlight"
  x: 0
  y: 130
  z: 0
  yaw: 0
  pitch: 90

